name: ci
on:
  push: { branches: [main] }
  pull_request:
permissions: { contents: read }
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.24', '1.25.11']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '${{ matrix.go }}' }
      - name: gofmt
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - name: staticcheck
        if: runner.os == 'Linux'
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - name: govulncheck
        if: runner.os == 'Linux'
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - run: go test -race -coverprofile=cover.out ./...
        if: runner.os != 'Windows'
      - run: go test -race ./...
        if: runner.os == 'Windows'
      - name: coverage gates
        if: runner.os == 'Linux'
        run: |
          go test -coverprofile=siws.out ./siws/...
          siws_pct=$(go tool cover -func=siws.out | tail -1 | awk '{gsub(/%/,"",$NF); print int($NF)}')
          echo "siws coverage: ${siws_pct}%"
          if [ "$siws_pct" -lt 95 ]; then echo "FAIL: siws coverage ${siws_pct}% < 95%"; exit 1; fi

          go test -coverprofile=siwx.out ./siwx/...
          siwx_pct=$(go tool cover -func=siwx.out | tail -1 | awk '{gsub(/%/,"",$NF); print int($NF)}')
          echo "siwx coverage: ${siwx_pct}%"
          if [ "$siwx_pct" -lt 90 ]; then echo "FAIL: siwx coverage ${siwx_pct}% < 90%"; exit 1; fi
  zero-dep-siws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.25.11' }
      - name: siws must be stdlib-only
        run: |
          deps=$(go list -deps ./siws | grep -v "^github.com/anitconsultant/siwx-go" | grep "\." | grep "/" || true)
          if [ -n "$deps" ]; then echo "siws has external deps:"; echo "$deps"; exit 1; fi
  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with: { go-version: '1.25.11' }
      - name: 60s per fuzz target
        run: |
          # WT-D: enumerate targets explicitly once they exist
          for t in $(grep -rl "func Fuzz" --include="*_test.go" . | sort -u); do
            pkg=$(dirname "$t")
            for fn in $(grep -o "func Fuzz[A-Za-z0-9_]*" "$t" | awk '{print $2}'); do
              go test -run=^$ -fuzz="^${fn}$" -fuzztime=60s "./$pkg" || exit 1
            done
          done
