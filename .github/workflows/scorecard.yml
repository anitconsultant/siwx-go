name: scorecard
on:
  push: { branches: [main] }
  schedule: [{ cron: '30 1 * * 1' }]
# Top-level is read-only; the elevated writes live at the job level. The
# OpenSSF publish step rejects results when id-token:write is set globally
# (HTTP 400 "global perm is set to write"), so it must be scoped to the job.
permissions: read-all
jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read         # checkout
      actions: read          # scorecard reads workflow run data
      security-events: write # upload SARIF to code scanning
      id-token: write        # OIDC token used to publish results
    steps:
      - uses: actions/checkout@v4
        with: { persist-credentials: false }
      - uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: results.sarif }
