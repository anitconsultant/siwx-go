<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>siwx-go Demo — Sign In With X</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    .subtitle { color: #94a3b8; font-size: .875rem; margin-bottom: 2rem; }
    .btn {
      display: flex; align-items: center; gap: .75rem;
      width: 100%; padding: .75rem 1.25rem;
      border: 1px solid #3b4270; border-radius: 8px;
      background: #252840; color: #e2e8f0;
      font-size: 1rem; cursor: pointer;
      transition: background .15s, border-color .15s;
      margin-bottom: .75rem;
    }
    .btn:hover { background: #2e3358; border-color: #5c6bc0; }
    .btn img { width: 24px; height: 24px; border-radius: 4px; }
    .divider { text-align: center; color: #475569; font-size: .8rem; margin: 1rem 0; }
    #result {
      display: none; margin-top: 1.5rem;
      background: #0d1117; border: 1px solid #2d3148;
      border-radius: 8px; padding: 1rem;
      font-size: .8rem; font-family: monospace;
      word-break: break-all; color: #7dd3fc;
    }
    #result.error { color: #f87171; }
    siwx-progress { display: block; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In With X</h1>
    <p class="subtitle">Connect your wallet to authenticate</p>

    <button class="btn" id="btn-solana">
      <img src="https://cryptologos.cc/logos/solana-sol-logo.png" alt="" onerror="this.style.display='none'" />
      Sign in with Phantom (Solana)
    </button>

    <div class="divider">or</div>

    <button class="btn" id="btn-evm">
      <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" alt="" onerror="this.style.display='none'" />
      Sign in with MetaMask (Ethereum)
    </button>

    <siwx-progress id="progress"></siwx-progress>

    <div id="result"></div>
  </div>

  <script type="module" src="siwx-progress.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
